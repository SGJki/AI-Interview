<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 面试助手</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // 从 URL 参数或 localStorage 获取 API 地址
        const urlParams = new URLSearchParams(window.location.search);
        const apiFromUrl = urlParams.get('api');
        const apiFromStorage = localStorage.getItem('api_base');

        if (apiFromUrl) {
            window.API_BASE = apiFromUrl;
            localStorage.setItem('api_base', apiFromUrl);
        } else if (apiFromStorage) {
            window.API_BASE = apiFromStorage;
        } else {
            window.API_BASE = 'http://127.0.0.1:8000';
        }

        // 显示当前连接的 API
        document.write('<style>#api-status{position:fixed;top:5px;right:5px;background:rgba(0,0,0,0.7);color:#fff;padding:5px 10px;border-radius:4px;font-size:12px;z-index:9999}</style>');
        document.write('<div id="api-status">API: ' + window.API_BASE + '</div>');
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 面试助手</h1>
            <div id="status" class="status">未连接</div>
        </header>

        <main>
            <!-- 服务选择标签页 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="dashboard">概览</button>
                <button class="tab-btn" data-tab="interview">面试</button>
                <button class="tab-btn" data-tab="training">专项训练</button>
                <button class="tab-btn" data-tab="knowledge">知识库</button>
            </div>

            <!-- 概览页面 -->
            <section id="dashboard" class="tab-content active">
                <h2>服务状态</h2>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>API 服务</h3>
                        <div id="api-status-display" class="service-status">检测中...</div>
                    </div>
                    <div class="dashboard-card">
                        <h3>面试服务</h3>
                        <p>支持完整面试流程</p>
                        <span class="badge success">可用</span>
                    </div>
                    <div class="dashboard-card">
                        <h3>专项训练</h3>
                        <p>针对特定技能点训练</p>
                        <span class="badge success">可用</span>
                    </div>
                    <div class="dashboard-card">
                        <h3>知识库</h3>
                        <p>RAG 检索和构建</p>
                        <span class="badge success">可用</span>
                    </div>
                </div>

                <h2 style="margin-top: 30px;">快速开始</h2>
                <div class="quick-actions">
                    <button class="btn btn-primary" onclick="switchTab('interview')">开始面试</button>
                    <button class="btn btn-secondary" onclick="switchTab('training')">专项训练</button>
                    <button class="btn btn-secondary" onclick="switchTab('knowledge')">构建知识库</button>
                </div>
            </section>

            <!-- 面试页面 -->
            <section id="interview" class="tab-content">
                <h2>AI 模拟面试</h2>

                <div class="card">
                    <h3>配置</h3>
                    <div class="form-group">
                        <label>会话 ID</label>
                        <input type="text" id="interview-session-id" placeholder="自动生成">
                    </div>
                    <div class="form-group">
                        <label>简历内容（可选）</label>
                        <textarea id="interview-resume-content" rows="4" placeholder="请粘贴简历内容，以便生成针对性问题..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>面试模式</label>
                            <select id="interview-mode">
                                <option value="free">自由模式</option>
                                <option value="training">专项训练</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>反馈模式</label>
                            <select id="interview-feedback-mode">
                                <option value="recorded">录播模式</option>
                                <option value="realtime">实时反馈</option>
                            </select>
                        </div>
                    </div>
                    <button id="interview-start-btn" class="btn btn-primary">开始面试</button>
                </div>

                <div id="interview-active" class="card hidden">
                    <h3>面试进行中</h3>
                    <div id="interview-session-info" class="session-info"></div>
                    <!-- 左右两栏布局 -->
                    <div style="display: flex; gap: 20px;">
                        <!-- 左侧：问题和回答 -->
                        <div style="flex: 1;">
                            <div id="interview-question" class="question-box">
                                <p class="placeholder">点击"下一题"获取问题</p>
                            </div>
                            <div id="interview-answer-section" class="hidden">
                                <div class="form-group">
                                    <label>你的回答</label>
                                    <textarea id="interview-answer-input" rows="6" placeholder="请输入你的回答..."></textarea>
                                </div>
                                <div class="button-row">
                                    <button id="interview-submit-btn" class="btn btn-primary">提交回答</button>
                                    <button id="interview-next-btn" class="btn btn-secondary">跳过</button>
                                </div>
                            </div>
                            <div class="button-row">
                                <button id="interview-next-question-btn" class="btn btn-primary">下一题</button>
                                <button id="interview-end-btn" class="btn btn-danger">结束面试</button>
                            </div>
                        </div>
                        <!-- 右侧：反馈区域 -->
                        <div style="flex: 1; min-width: 300px;">
                            <div id="interview-feedback-container" class="feedback-container">
                                <div class="feedback-section">
                                    <h4>思考过程</h4>
                                    <div id="interview-thinking" class="thinking-box">等待提交回答...</div>
                                </div>
                                <div class="feedback-section">
                                    <h4>反馈</h4>
                                    <div id="interview-feedback" class="feedback-box">等待提交回答...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="interview-result" class="card hidden">
                    <h3>面试结果</h3>
                    <div id="interview-result-display"></div>
                    <button class="btn btn-primary" onclick="switchTab('dashboard')">返回概览</button>
                </div>
            </section>

            <!-- 专项训练页面 -->
            <section id="training" class="tab-content">
                <h2>专项技能训练</h2>

                <div class="card">
                    <h3>配置</h3>
                    <div class="form-group">
                        <label>会话 ID</label>
                        <input type="text" id="training-session-id" placeholder="自动生成">
                    </div>
                    <div class="form-group">
                        <label>技能点</label>
                        <select id="training-skill-point">
                            <option value="Python">Python 编程</option>
                            <option value="数据库">数据库</option>
                            <option value="Redis">Redis 缓存</option>
                            <option value="微服务">微服务架构</option>
                            <option value="系统设计">系统设计</option>
                        </select>
                    </div>
                    <button id="training-start-btn" class="btn btn-primary">开始训练</button>
                </div>

                <div id="training-active" class="card hidden">
                    <h3>训练进行中 - <span id="training-skill-label"></span></h3>
                    <div id="training-question" class="question-box">
                        <p class="placeholder">点击"下一题"获取问题</p>
                    </div>
                    <div id="training-answer-section" class="hidden">
                        <div class="form-group">
                            <label>你的回答</label>
                            <textarea id="training-answer-input" rows="6" placeholder="请输入你的回答..."></textarea>
                        </div>
                        <div class="button-row">
                            <button id="training-submit-btn" class="btn btn-primary">提交回答</button>
                        </div>
                    </div>
                    <div id="training-feedback" class="feedback-box hidden"></div>
                    <div class="button-row">
                        <button id="training-next-question-btn" class="btn btn-primary">下一题</button>
                        <button id="training-end-btn" class="btn btn-danger">结束训练</button>
                    </div>
                </div>

                <div id="training-result" class="card hidden">
                    <h3>训练结果</h3>
                    <div id="training-result-display"></div>
                    <button class="btn btn-primary" onclick="switchTab('dashboard')">返回概览</button>
                </div>
            </section>

            <!-- 知识库页面 -->
            <section id="knowledge" class="tab-content">
                <h2>知识库管理</h2>

                <div class="card">
                    <h3>构建知识库</h3>
                    <div class="form-group">
                        <label>知识库 ID</label>
                        <input type="text" id="kb-id" value="default" placeholder="知识库标识">
                    </div>
                    <div class="form-group">
                        <label>数据源类型</label>
                        <select id="kb-source-type">
                            <option value="preset">预设面试题库</option>
                            <option value="standard">标准回答库</option>
                            <option value="skill_point">技能点</option>
                            <option value="resume">简历</option>
                            <option value="full">完整知识库</option>
                        </select>
                    </div>
                    <div id="kb-skill-points-section" class="form-group hidden">
                        <label>技能点（多个用逗号分隔）</label>
                        <input type="text" id="kb-skill-points" placeholder="Python,Redis,微服务">
                    </div>
                    <div id="kb-resume-section" class="form-group hidden">
                        <label>简历内容</label>
                        <textarea id="kb-resume-content" rows="8" placeholder="请粘贴简历内容..."></textarea>
                    </div>
                    <button id="kb-build-btn" class="btn btn-primary">构建知识库</button>
                    <div id="kb-build-status" class="build-status"></div>
                </div>

                <div class="card">
                    <h3>查询知识库</h3>
                    <div class="form-group">
                        <label>查询内容</label>
                        <input type="text" id="kb-query-input" placeholder="输入查询内容...">
                    </div>
                    <button id="kb-query-btn" class="btn btn-secondary">查询</button>
                    <div id="kb-query-results" class="query-results"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
